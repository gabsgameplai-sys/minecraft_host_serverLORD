<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host LORD - Login</title>
  <style>
    :root{
      --bg:#0b1120;
      --card:#111827;
      --border:#1f2937;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --danger-bg:#3a1624;
      --danger-border:#7f1d1d;
      --danger-text:#fecdd3;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#0b1120 0%,#0a0f1d 100%);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(17,24,39,.95);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    .logo{
      font-size:28px;
      font-weight:700;
      text-align:center;
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-bottom:24px;
      font-size:14px;
    }

    form{
      display:grid;
      gap:14px;
    }

    label{
      font-size:14px;
      color:var(--text);
      margin-bottom:6px;
      display:block;
    }

    .field{
      display:grid;
      gap:6px;
    }

    input{
      width:100%;
      padding:14px 15px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0f172a;
      color:var(--text);
      outline:none;
      font-size:15px;
    }

    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }

    button{
      border:none;
      border-radius:12px;
      padding:14px 16px;
      background:var(--primary);
      color:white;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      margin-top:6px;
    }

    button:hover{
      background:var(--primary-hover);
    }

    .error{
      display:none;
      background:var(--danger-bg);
      border:1px solid var(--danger-border);
      color:var(--danger-text);
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
    }

    .hint{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .credentials{
      margin-top:14px;
      padding:12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#0f172a;
      font-size:13px;
      color:var(--muted);
    }

    .credentials strong{
      color:var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Host LORD</div>
    <div class="subtitle">Entre com sua conta para acessar o painel</div>

    <div id="errorBox" class="error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" placeholder="Digite seu usuário" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" placeholder="Digite sua senha" required />
      </div>

      <button type="submit">Entrar</button>
    </form>

    <div class="credentials">
      <div><strong>Admin:</strong> admin / 218421</div>
      <div><strong>Convidado:</strong> convidado / 123456</div>
    </div>

    <div class="hint">
      Se o login falhar, verifique se o backend foi reiniciado após editar o <strong>server.js</strong> ou o arquivo <strong>.env</strong>.
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function clearError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        let data = {};
        try {
          data = await response.json();
        } catch {
          showError("Resposta inválida do servidor.");
          return;
        }

        if (!response.ok || !data.ok) {
          showError(data.message || "Falha no login.");
          return;
        }

        localStorage.setItem("panelUser", data.username || username);
        localStorage.setItem("panelRole", data.role || "guest");

        window.location.href = data.redirect || "/panel.html";
      } catch (err) {
        console.error("Erro no login:", err);
        showError("Erro ao conectar com o servidor.");
      }
    });
  </script>
</body>
</html>
