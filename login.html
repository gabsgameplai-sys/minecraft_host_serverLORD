<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Minecraft Host Panel</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:15px;
}

main{
padding:20px;
}

button{
padding:10px;
margin:5px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.console{
background:black;
padding:10px;
height:300px;
overflow:auto;
font-family:monospace;
}

</style>

</head>

<body>

<header>

<h2>Minecraft Host Panel</h2>

<button onclick="logout()">Logout</button>

</header>

<main>

<h3>Status do servidor</h3>

<div id="status">Carregando...</div>

<br>

<button onclick="startServer()">Start</button>
<button onclick="stopServer()">Stop</button>
<button onclick="restartServer()">Restart</button>

<h3>Console</h3>

<div class="console" id="console"></div>

<input id="cmd" placeholder="comando">

<button onclick="sendCommand()">Enviar</button>

</main>

<script>

const API_BASE="https://unvictimized-vincenzo-expurgatorial.ngrok-free.dev";

const token=localStorage.getItem("token");

if(!token){

window.location="login.html";

}

async function api(path,options={}){

options.headers={
"Content-Type":"application/json",
Authorization:`Bearer ${token}`,
...(options.headers||{})
};

const res=await fetch(`${API_BASE}${path}`,options);

return res.json();

}

async function loadStatus(){

try{

const data=await api("/api/status");

document.getElementById("status").innerText=
data.online ? "Servidor Online" : "Servidor Offline";

}catch{

alert("Erro ao conectar com o backend.");

}

}

async function loadConsole(){

try{

const data=await api("/api/console");

const consoleDiv=document.getElementById("console");

consoleDiv.innerHTML=data.lines.join("<br>");

consoleDiv.scrollTop=consoleDiv.scrollHeight;

}catch{}

}

async function startServer(){

await api("/api/start",{method:"POST"});

}

async function stopServer(){

await api("/api/stop",{method:"POST"});

}

async function restartServer(){

await api("/api/restart",{method:"POST"});

}

async function sendCommand(){

const cmd=document.getElementById("cmd").value;

await api("/api/command",{
method:"POST",
body:JSON.stringify({command:cmd})
});

document.getElementById("cmd").value="";

}

function logout(){

localStorage.removeItem("token");

window.location="login.html";

}

setInterval(loadConsole,2000);

loadStatus();
loadConsole();

</script>

</body>
</html>
