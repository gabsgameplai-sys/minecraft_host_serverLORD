<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host LORD - Login</title>
  <style>
    :root{
      --bg:#0b1120;
      --card:#111827;
      --border:#1f2937;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --danger-bg:#3a1624;
      --danger-border:#7f1d1d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#0b1120 0%,#0a0f1d 100%);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(17,24,39,.96);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
    }

    p{
      margin:0 0 20px;
      color:var(--muted);
    }

    label{
      display:block;
      margin:14px 0 8px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#020617;
      color:var(--text);
      outline:none;
    }

    .row{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      background:var(--primary);
      color:white;
      padding:12px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }

    button:hover{
      background:var(--primary-hover);
    }

    .msg{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      background:var(--danger-bg);
      border:1px solid var(--danger-border);
      display:none;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:14px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Host LORD</h1>
    <p>Entre com seu usuário e senha para acessar o painel.</p>

    <label for="backendUrl">URL do backend</label>
    <input id="backendUrl" placeholder="http://192.168.0.10:3000" />

    <label for="username">Usuário</label>
    <input id="username" placeholder="admin ou convidado" />

    <label for="password">Senha</label>
    <input id="password" type="password" placeholder="********" />

    <div class="row">
      <button onclick="doLogin()">Entrar</button>
    </div>

    <div id="msg" class="msg"></div>

    <div class="small">
      O usuário <strong>convidado</strong> pode ver o painel, mas não pode editar nada.
    </div>
  </div>

  <script>
    const backendInput = document.getElementById("backendUrl");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const msg = document.getElementById("msg");

    backendInput.value = localStorage.getItem("backend_url") || "https://minecrafthostserverlord-production.up.railway.app";

    function showError(text) {
      msg.style.display = "block";
      msg.textContent = text;
    }

    function clearError() {
      msg.style.display = "none";
      msg.textContent = "";
    }

    async function doLogin() {
      try {
        clearError();

        const backend = backendInput.value.trim();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!backend) {
          showError("Preencha a URL do backend.");
          return;
        }

        if (!username || !password) {
          showError("Preencha usuário e senha.");
          return;
        }

        localStorage.setItem("backend_url", backend);

        const res = await fetch(backend + "/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Falha no login.");
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user || {}));

        window.location.href = "panel.html";
      } catch (err) {
        showError(err.message || "Erro no login.");
      }
    }

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
