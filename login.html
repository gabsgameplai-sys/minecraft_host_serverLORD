<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Minecraft Host LORD</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #101827, #1e293b);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #334155;
    }

    .secondary-btn:hover {
      background: #475569;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    .small {
      margin-top: 14px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.5;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .message.success {
      display: block;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #bbf7d0;
    }

    .google-wrap {
      display: flex;
      justify-content: center;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .top-actions button {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Minecraft Host LORD</h1>
    <p class="subtitle">Entre no painel do seu host Minecraft</p>

    <label for="apiBase">Endereço do backend</label>
    <input
      id="apiBase"
      type="text"
      placeholder="Ex: http://192.168.0.10:3000"
    />

    <div class="top-actions">
      <button type="button" class="secondary-btn" onclick="usarAtual()">
        Usar endereço atual
      </button>
      <button type="button" class="secondary-btn" onclick="testarConexao()">
        Testar conexão
      </button>
    </div>

    <label for="username">Usuário</label>
    <input id="username" type="text" placeholder="Digite seu usuário" />

    <label for="password">Senha</label>
    <input id="password" type="password" placeholder="Digite sua senha" />

    <button type="button" onclick="login()">Entrar</button>

    <div class="divider">ou</div>

    <div class="google-wrap">
      <div
        id="g_id_onload"
        data-client_id="735004448085-15s049l8cd9ged1d9gva134t8hoc39gm.apps.googleusercontent.com"
        data-context="signin"
        data-ux_mode="popup"
        data-callback="handleGoogleResponse"
        data-auto_prompt="false">
      </div>

      <div
        class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="signin_with"
        data-shape="pill"
        data-logo_alignment="left">
      </div>
    </div>

    <div id="messageBox" class="message"></div>

    <p class="small">
      Dica: se o painel estiver no mesmo PC do backend, pode deixar o campo do backend
      no endereço atual. Se estiver em outro dispositivo da rede, use o IP local do PC
      onde o Node está rodando.
    </p>
  </div>

  <script>
    function normalizeBaseUrl(url) {
      return String(url || "").trim().replace(/\/+$/, "");
    }

    function getApiBase() {
      const inputValue = document.getElementById("apiBase")?.value?.trim();
      if (inputValue) return normalizeBaseUrl(inputValue);

      const saved = localStorage.getItem("apiBase");
      if (saved) return normalizeBaseUrl(saved);

      return normalizeBaseUrl(window.location.origin);
    }

    function setMessage(text, type = "error") {
      const box = document.getElementById("messageBox");
      box.className = `message ${type}`;
      box.textContent = text;
    }

    function clearMessage() {
      const box = document.getElementById("messageBox");
      box.className = "message";
      box.textContent = "";
    }

    function usarAtual() {
      document.getElementById("apiBase").value = window.location.origin;
      setMessage("Endereço atual aplicado.", "success");
    }

    async function testarConexao() {
      clearMessage();
      const apiBase = getApiBase();

      try {
        const res = await fetch(`${apiBase}/api/ping`);
        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Falha no ping.");
        }

        localStorage.setItem("apiBase", apiBase);
        setMessage(`Conexão OK com ${apiBase}`, "success");
      } catch (err) {
        setMessage(`Não foi possível conectar em ${apiBase}`);
      }
    }

    async function login() {
      clearMessage();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const apiBase = getApiBase();

      if (!username || !password) {
        setMessage("Preencha usuário e senha.");
        return;
      }

      try {
        const res = await fetch(`${apiBase}/api/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          setMessage(data.error || "Falha no login.");
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("apiBase", apiBase);
        localStorage.setItem("username", data.user?.username || username);

        window.location.href = "panel.html";
      } catch (err) {
        setMessage("Erro ao conectar com o backend.");
      }
    }

    async function handleGoogleResponse(response) {
      clearMessage();

      const apiBase = getApiBase();

      if (!response || !response.credential) {
        setMessage("Login Google inválido.");
        return;
      }

      try {
        const res = await fetch(`${apiBase}/api/google-login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            credential: response.credential
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          setMessage(data.error || "Falha no login Google.");
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("apiBase", apiBase);
        localStorage.setItem("username", data.user?.username || "Google User");

        window.location.href = "panel.html";
      } catch (err) {
        setMessage("Erro ao conectar com o backend no login Google.");
      }
    }

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        login();
      }
    });

    window.addEventListener("load", () => {
      const saved = localStorage.getItem("apiBase");
      document.getElementById("apiBase").value = saved || window.location.origin;
    });
  </script>
</body>
</html>
