<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minecraft Host Login</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
border:none;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}
</style>
</head>

<body>

<div class="login">

<h2>Login</h2>

<input id="username" placeholder="Usuário">
<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<script>

const API_BASE="https://SEU-NGROK-AQUI.ngrok-free.app";

async function login(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

try{

const res=await fetch(`${API_BASE}/api/login`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
});

const data=await res.json();

if(!data.ok){

alert(data.error || "Erro ao fazer login");
return;

}

localStorage.setItem("token",data.token);

window.location="panel.html";

}catch(e){

alert("Erro ao conectar com o backend.");

}

}

</script>

</body>
</html>
