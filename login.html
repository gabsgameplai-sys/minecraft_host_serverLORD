<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host LORD - Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{
      --bg:#0b1120;
      --card:#111827;
      --border:#1f2937;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --primary:#2563eb;
      --danger-bg:#3a1624;
      --danger-border:#7f1d1d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#0b1120 0%,#0a0f1d 100%);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(17,24,39,.96);
      border:1px solid var(--border);
      border-radius:20px;
      padding:28px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
    }

    p{
      margin:0 0 20px;
      color:var(--muted);
    }

    label{
      display:block;
      margin:14px 0 8px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#020617;
      color:var(--text);
      outline:none;
    }

    .row{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      background:var(--primary);
      color:white;
      padding:12px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }

    .msg{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      background:var(--danger-bg);
      border:1px solid var(--danger-border);
      display:none;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:14px;
      line-height:1.5;
    }

    #googleBtnWrap{
      margin-top:16px;
      display:flex;
      justify-content:center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Host LORD</h1>
    <p>Entre com sua conta Google para acessar o painel.</p>

    <label for="backendUrl">URL do backend</label>
    <input id="backendUrl" placeholder="http://192.168.0.10:3000" />

    <div class="row">
      <button onclick="saveBackendUrl()">Salvar backend</button>
      <button onclick="goPanel()">Abrir painel</button>
    </div>

    <div id="googleBtnWrap"></div>

    <div id="msg" class="msg"></div>

    <div class="small">
      O backend precisa estar rodando no seu PC/VPS.  
      Exemplo: <code>http://192.168.0.10:3000</code>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = "SEU_GOOGLE_CLIENT_ID_AQUI";

    const backendInput = document.getElementById("backendUrl");
    const msg = document.getElementById("msg");

    backendInput.value = localStorage.getItem("backend_url") || "http://localhost:3000";

    function showError(text){
      msg.style.display = "block";
      msg.textContent = text;
    }

    function clearError(){
      msg.style.display = "none";
      msg.textContent = "";
    }

    function saveBackendUrl(){
      const url = backendInput.value.trim();
      if(!url){
        showError("Preencha a URL do backend.");
        return;
      }
      localStorage.setItem("backend_url", url);
      clearError();
      alert("Backend salvo.");
    }

    function goPanel(){
      window.location.href = "panel.html";
    }

    async function handleGoogleCredentialResponse(response){
      try{
        clearError();

        const backend = (localStorage.getItem("backend_url") || backendInput.value || "").trim();
        if(!backend){
          showError("Defina a URL do backend antes de entrar.");
          return;
        }

        localStorage.setItem("backend_url", backend);

        if(!response || !response.credential){
          showError("O Google não retornou o token de login.");
          return;
        }

        const res = await fetch(backend + "/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: response.credential
          })
        });

        const data = await res.json();

        if(!res.ok || !data.ok){
          throw new Error(data.error || "Falha no login.");
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user || {}));

        window.location.href = "panel.html";
      }catch(err){
        showError(err.message || "Erro no login.");
      }
    }

    window.handleGoogleCredentialResponse = handleGoogleCredentialResponse;

    window.onload = () => {
      if(!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === "735004448085-15s049l8cd9ged1d9gva134t8hoc39gm.apps.googleusercontent.com"){
        showError("Coloque seu GOOGLE_CLIENT_ID no login.html.");
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredentialResponse
      });

      google.accounts.id.renderButton(
        document.getElementById("googleBtnWrap"),
        {
          theme: "outline",
          size: "large",
          text: "signin_with",
          shape: "pill",
          width: 280
        }
      );
    };
  </script>
</body>
</html>
