<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MyMineHost</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  font-family:Arial,sans-serif;
  color:white;
  padding:20px;
}

.card{
  width:100%;
  max-width:430px;
  background:#1e293b;
  border:1px solid #334155;
  border-radius:16px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
  font-size:28px;
  font-weight:bold;
  margin-bottom:8px;
}

.note{
  color:#94a3b8;
  margin-bottom:20px;
}

input{
  width:100%;
  margin-bottom:12px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
  border-radius:10px;
  padding:12px;
  font-size:15px;
}

button{
  width:100%;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.error{
  margin-top:12px;
  color:#fca5a5;
  min-height:20px;
}

.users-box{
  margin-top:18px;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  border:1px solid #334155;
  color:#cbd5e1;
  font-size:14px;
}

.google-box{
  margin-top:16px;
  display:flex;
  justify-content:center;
}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">MyMineHost</div>
    <div class="note">Faça login para acessar o painel.</div>

    <input id="username" type="text" placeholder="Usuário">
    <input id="password" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="google-box">
      <div id="g_id_onload"
           data-client_id="COLOQUE_SEU_GOOGLE_CLIENT_ID"
           data-callback="handleGoogleLogin">
      </div>

      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="continue_with"
           data-shape="pill"
           data-logo_alignment="left">
      </div>
    </div>

    <div id="error" class="error"></div>

    <div class="users-box">
      <strong>Perfis padrão:</strong><br>
      adminLord / 123456<br>
      adminSassdio / 123456
    </div>
  </div>

<script>
const API_BASE = "http://localhost:3000/api";

async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");

  errorBox.innerText = "";

  try{
    const res = await fetch(`${API_BASE}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(!res.ok){
      errorBox.innerText = data.error || "Falha no login.";
      return;
    }

    localStorage.setItem("myminehost_token", data.token);
    localStorage.setItem("myminehost_user", data.user.username);

    window.location.href = "panel.html";
  }catch(err){
    errorBox.innerText = "Falha ao conectar com o backend.";
  }
}

async function handleGoogleLogin(response){
  const errorBox = document.getElementById("error");
  errorBox.innerText = "";

  try{
    const res = await fetch(`${API_BASE}/google-login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        credential: response.credential
      })
    });

    const data = await res.json();

    if(!res.ok){
      errorBox.innerText = data.error || "Falha no login com Google.";
      return;
    }

    localStorage.setItem("myminehost_token", data.token);
    localStorage.setItem("myminehost_user", data.user.username);

    window.location.href = "panel.html";
  }catch(err){
    errorBox.innerText = "Falha ao conectar com o backend.";
  }
}
</script>
</body>
</html>
