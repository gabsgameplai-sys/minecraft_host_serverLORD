<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel</title>

<style>

body{
 background:#0f172a;
 color:white;
 font-family:Arial;
}

.console{
 background:black;
 height:500px;
 overflow:auto;
 padding:10px;
 font-family:monospace;
}

button{
 padding:10px;
 margin:5px;
}

</style>

</head>

<body>

<h1>Painel Minecraft</h1>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="restart()">Restart</button>

<h2>Console</h2>

<div id="console" class="console"></div>

<input id="cmd" placeholder="comando">
<button onclick="send()">Enviar</button>

<script>

const API="http://localhost:3000/api"
const token=localStorage.getItem("token")

async function fetchConsole(){

 const res=await fetch(API+"/console",{
  headers:{Authorization:"Bearer "+token}
 })

 const data=await res.json()

 const c=document.getElementById("console")

 c.innerHTML=""

 data.lines.forEach(l=>{

  const d=document.createElement("div")
  d.innerText=l
  c.appendChild(d)

 })

 c.scrollTop=c.scrollHeight

}

async function start(){
 await fetch(API+"/start",{method:"POST",headers:{Authorization:"Bearer "+token}})
}

async function stop(){
 await fetch(API+"/stop",{method:"POST",headers:{Authorization:"Bearer "+token}})
}

async function restart(){
 await fetch(API+"/restart",{method:"POST",headers:{Authorization:"Bearer "+token}})
}

async function send(){

 const cmd=document.getElementById("cmd").value

 await fetch(API+"/command",{
  method:"POST",
  headers:{
   Authorization:"Bearer "+token,
   "Content-Type":"application/json"
  },
  body:JSON.stringify({command:cmd})
 })

}

setInterval(fetchConsole,2000)

</script>

</body>
</html>
