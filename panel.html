<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host LORD - Painel</title>

<style>

:root{
--bg:#0b1120;
--card:#0f172a;
--border:#1f2937;
--text:#e5e7eb;
--muted:#94a3b8;
--primary:#2563eb;
--danger:#dc2626;
--success:#16a34a;
--radius:16px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Arial;
background:var(--bg);
color:var(--text);
}

.app{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
background:#0f172a;
border-right:1px solid var(--border);
padding:20px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.brand-logo{
width:44px;
height:44px;
border-radius:12px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

.brand-logo img{
width:100%;
height:100%;
object-fit:cover;
}

.brand h1{
margin:0;
font-size:18px;
}

.brand p{
margin:0;
font-size:12px;
color:var(--muted);
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu button{
background:none;
border:none;
color:var(--text);
padding:12px;
text-align:left;
border-radius:10px;
cursor:pointer;
}

.menu button:hover{
background:#111827;
}

.menu button.active{
background:#1f2937;
}

/* MAIN */

.main{
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.status{
display:flex;
align-items:center;
gap:8px;
background:#111827;
padding:8px 14px;
border-radius:999px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#64748b;
}

.dot.online{
background:#22c55e;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:18px;
margin-bottom:18px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button.primary{background:var(--primary);color:white}
button.success{background:var(--success);color:white}
button.danger{background:var(--danger);color:white}
button.secondary{background:#334155;color:white}

button.primary,
button.success,
button.danger,
button.secondary{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

.console{
width:100%;
height:350px;
background:#020617;
color:#93c5fd;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
font-family:monospace;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:#020617;
color:white;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="brand">
<div class="brand-logo">
<img src="logo.png">
</div>
<div>
<h1>Host LORD</h1>
<p>Painel Minecraft</p>
</div>
</div>

<div class="menu">

<button class="tab-btn active" data-tab="dashboard">🏠 Dashboard</button>
<button class="tab-btn" data-tab="console">🖥 Console</button>
<button class="tab-btn" data-tab="files">📁 Arquivos</button>
<button class="tab-btn" data-tab="plugins">🔌 Plugins</button>

<button onclick="window.location.href='temas.html'">🎨 Temas</button>
<button onclick="window.location.href='tiktok.html'">📱 TikTok</button>

</div>

</aside>

<!-- MAIN -->

<main class="main">

<div class="topbar">
<h2 id="pageTitle">Dashboard</h2>

<div class="status">
<div id="statusDot" class="dot"></div>
<span id="statusText">Carregando...</span>
</div>

</div>

<!-- DASHBOARD -->

<section id="tab-dashboard">

<div class="card">

<h3>Controles do servidor</h3>

<div class="actions">

<button class="success" onclick="startServer()">Iniciar</button>
<button class="secondary" onclick="restartServer()">Reiniciar</button>
<button class="danger" onclick="stopServer()">Parar</button>
<button class="primary" onclick="refreshAll()">Atualizar</button>

</div>

</div>

<div class="card">

<p><strong>Host:</strong> <span id="dashHost">--</span></p>
<p><strong>Porta:</strong> <span id="dashPort">--</span></p>
<p><strong>PID:</strong> <span id="dashPid">--</span></p>

</div>

</section>

<!-- CONSOLE -->

<section id="tab-console" class="hidden">

<div class="card">

<textarea id="consoleBox" class="console" readonly></textarea>

<div style="margin-top:10px">
<input id="commandInput" placeholder="Digite comando">
</div>

<div style="margin-top:10px">

<button class="primary" onclick="sendCommand()">Enviar</button>

</div>

</div>

</section>

<!-- FILES -->

<section id="tab-files" class="hidden">

<div class="card">

<h3>Arquivos</h3>

<button class="primary" onclick="loadFiles()">Atualizar</button>

<div id="filesList" style="margin-top:10px"></div>

</div>

</section>

<!-- PLUGINS -->

<section id="tab-plugins" class="hidden">

<div class="card">

<h3>Upload Plugin</h3>

<input type="file" id="pluginFile">

<div style="margin-top:10px">

<button class="primary" onclick="uploadPlugin()">Enviar Plugin</button>

</div>

</div>

</section>

</main>

</div>

<script>

/* BACKEND */

const API = localStorage.getItem("backend_url") || "http://localhost:3000"

/* TABS */

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))

document.getElementById("tab-"+btn.dataset.tab).classList.remove("hidden")

document.getElementById("pageTitle").innerText=btn.innerText
}
})

/* API */

async function api(path,options={}){

const res=await fetch(API+path,options)

const data=await res.json()

return data
}

/* STATUS */

async function loadStatus(){

try{

const data=await api("/api/status")

document.getElementById("statusText").innerText=data.online?"Online":"Offline"

document.getElementById("statusDot").classList.toggle("online",data.online)

document.getElementById("dashHost").innerText=data.minecraftHost||"--"
document.getElementById("dashPort").innerText=data.minecraftPort||"--"
document.getElementById("dashPid").innerText=data.pid||"--"

}catch(e){

document.getElementById("statusText").innerText="Erro conexão"

}

}

/* SERVER */

async function startServer(){

await api("/api/start",{method:"POST"})

alert("Servidor iniciado")

}

async function stopServer(){

await api("/api/stop",{method:"POST"})

alert("Servidor parado")

}

async function restartServer(){

await api("/api/restart",{method:"POST"})

alert("Servidor reiniciando")

}

/* CONSOLE */

async function loadConsole(){

const data=await api("/api/console")

const box=document.getElementById("consoleBox")

box.value=(data.log||[]).join("\n")

box.scrollTop=box.scrollHeight

}

async function sendCommand(){

const cmd=document.getElementById("commandInput").value

await api("/api/command",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({command:cmd})

})

document.getElementById("commandInput").value=""

loadConsole()

}

/* FILES */

async function loadFiles(){

const data=await api("/api/files")

const list=document.getElementById("filesList")

list.innerHTML=""

data.files.forEach(f=>{

const div=document.createElement("div")

div.innerText=f.name

list.appendChild(div)

})

}

/* PLUGIN */

async function uploadPlugin(){

const file=document.getElementById("pluginFile").files[0]

const form=new FormData()

form.append("plugin",file)

await fetch(API+"/api/upload-plugin",{

method:"POST",

body:form

})

alert("Plugin enviado")

}

/* REFRESH */

function refreshAll(){

loadStatus()
loadConsole()

}

loadStatus()

setInterval(loadStatus,5000)
setInterval(loadConsole,2500)

</script>

</body>
</html>
