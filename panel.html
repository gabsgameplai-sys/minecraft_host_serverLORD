<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Host LORD</title>

<style>
:root{
  --bg:#0f172a;
  --bg-soft:#020617;
  --card:#020617;
  --text:#ffffff;
  --input:#020617;
  --border:#334155;
  --nav:#111827;
  --nav-hover:#2563eb;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
}

html[data-theme="light"]{
  --bg:#eef2ff;
  --bg-soft:#ffffff;
  --card:#ffffff;
  --text:#0f172a;
  --input:#ffffff;
  --border:#cbd5e1;
  --nav:#e2e8f0;
  --nav-hover:#2563eb;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
}

html[data-theme="lord"]{
  --bg:#2b1d0e;
  --bg-soft:#3b2613;
  --card:#3a2612;
  --text:#f5e6c8;
  --input:#2a1b0c;
  --border:#8b5e2b;
  --nav:#4a3117;
  --nav-hover:#ffd54a;
  --primary:#ffd54a;
  --primary-hover:#f5c518;
}

html[data-theme="creeper"]{
  --bg:#0f1f0f;
  --bg-soft:#142814;
  --card:#1b331b;
  --text:#d8ffd8;
  --input:#102510;
  --border:#2e7d32;
  --nav:#244424;
  --nav-hover:#4caf50;
  --primary:#4caf50;
  --primary-hover:#43a047;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

.sidebar{
  width:230px;
  background:var(--bg-soft);
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.nav-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:var(--nav);
  border:none;
  color:var(--text);
  cursor:pointer;
  border-radius:6px;
}

.nav-btn:hover{
  background:var(--nav-hover);
  color:#fff;
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid var(--border);
}

.console{
  background:black;
  height:350px;
  overflow:auto;
  padding:10px;
  font-family:monospace;
  font-size:13px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  margin-bottom:10px;
  background:var(--input);
  border:1px solid var(--border);
  color:var(--text);
}

button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green{background:#22c55e}
.red{background:#dc2626}
.blue{background:var(--primary); color:white}
.blue:hover{background:var(--primary-hover)}

.aternos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  margin-top:18px;
}

.aternos-item{
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}

.aternos-item label{
  display:block;
  font-size:14px;
  font-weight:bold;
  margin-bottom:8px;
}

.aternos-item input,
.aternos-item select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  margin:0;
}

.aternos-item select{
  cursor:pointer;
}
</style>
</head>

<body>
<div class="sidebar">
  <h2>👑 Host LORD</h2>

  <button class="nav-btn" onclick="show('dashboard')">🏠 Dashboard</button>
  <button class="nav-btn" onclick="show('console')">🖥 Console</button>
  <button class="nav-btn" onclick="show('config')">⚙️ Config</button>
  <button class="nav-btn" onclick="show('plugins')">🧩 Plugins</button>
  <button class="nav-btn" onclick="show('files')">📁 Arquivos</button>

  <button class="nav-btn" onclick="window.location='tiktok.html'">🎵 TikTok LIVE</button>
  <button class="nav-btn" onclick="window.location='temas.html'">🎨 Temas</button>

  <button class="nav-btn" onclick="show('account')">👤 Conta</button>
  <button class="nav-btn" onclick="logout()">🚪 Sair</button>
</div>

<div class="main">
  <div id="dashboard" class="card">
    <h2>📡 Status do servidor</h2>
    <p>Status: <span id="status">...</span></p>
    <p>IP: <span id="ip"></span></p>

    <button class="green" onclick="start()">Iniciar</button>
    <button class="red" onclick="stop()">Parar</button>
    <button class="blue" onclick="restart()">Reiniciar</button>
  </div>

  <div id="console" class="card" style="display:none">
    <h2>🖥 Console</h2>
    <div id="consoleBox" class="console"></div>
    <input id="command" placeholder="digite comando">
    <button class="blue" onclick="sendCommand()">Enviar</button>
  </div>

  <div id="config" class="card" style="display:none">
    <h2>⚙️ Configuração</h2>

    <p style="opacity:.8; margin-bottom:18px;">
      Edite as opções principais do seu servidor Minecraft.
    </p>

    <div class="aternos-grid">
      <div class="aternos-item">
        <label>MOTD</label>
        <input id="cfg_motd" placeholder="Meu Servidor Minecraft">
      </div>

      <div class="aternos-item">
        <label>Gamemode</label>
        <select id="cfg_gamemode">
          <option value="survival">Survival</option>
          <option value="creative">Creative</option>
          <option value="adventure">Adventure</option>
          <option value="spectator">Spectator</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Dificuldade</label>
        <select id="cfg_difficulty">
          <option value="peaceful">Peaceful</option>
          <option value="easy">Easy</option>
          <option value="normal">Normal</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Máx. de players</label>
        <input id="cfg_maxplayers" type="number" min="1" placeholder="20">
      </div>

      <div class="aternos-item">
        <label>PVP</label>
        <select id="cfg_pvp">
          <option value="true">Ativado</option>
          <option value="false">Desativado</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Online Mode</label>
        <select id="cfg_online_mode">
          <option value="true">Ativado</option>
          <option value="false">Desativado</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Whitelist</label>
        <select id="cfg_whitelist">
          <option value="true">Ativada</option>
          <option value="false">Desativada</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Command Blocks</label>
        <select id="cfg_commandblocks">
          <option value="true">Ativados</option>
          <option value="false">Desativados</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Hardcore</label>
        <select id="cfg_hardcore">
          <option value="true">Ativado</option>
          <option value="false">Desativado</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>Allow Nether</label>
        <select id="cfg_nether">
          <option value="true">Ativado</option>
          <option value="false">Desativado</option>
        </select>
      </div>

      <div class="aternos-item">
        <label>View Distance</label>
        <input id="cfg_viewdistance" type="number" min="2" placeholder="10">
      </div>

      <div class="aternos-item">
        <label>Simulation Distance</label>
        <input id="cfg_simdistance" type="number" min="2" placeholder="10">
      </div>

      <div class="aternos-item">
        <label>Spawn Protection</label>
        <input id="cfg_spawnprotection" type="number" min="0" placeholder="16">
      </div>

      <div class="aternos-item">
        <label>Seed do mundo</label>
        <input id="cfg_seed" placeholder="Seed opcional">
      </div>

      <div class="aternos-item">
        <label>Nome do mundo</label>
        <input id="cfg_levelname" placeholder="world">
      </div>

      <div class="aternos-item">
        <label>Porta do servidor</label>
        <input id="cfg_serverport" type="number" min="1" placeholder="25565">
      </div>
    </div>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="blue" onclick="saveConfig()">💾 Salvar configuração</button>
      <button class="nav-btn" style="width:auto; margin:0;" onclick="loadConfig()">🔄 Recarregar</button>
    </div>
  </div>

  <div id="plugins" class="card" style="display:none">
    <h2>🧩 Plugins</h2>
    <input type="file" id="pluginFile">
    <button class="blue" onclick="uploadPlugin()">Enviar</button>
    <div id="pluginList"></div>
  </div>

  <div id="files" class="card" style="display:none">
    <h2>📁 Arquivos</h2>
    <input id="path" placeholder="caminho">
    <button class="blue" onclick="loadFiles()">Abrir</button>
    <div id="fileList"></div>
  </div>

  <div id="account" class="card" style="display:none">
    <h2>👤 Conta</h2>
    <p>Usuário: <span id="username"></span></p>

    <input type="password" id="oldpass" placeholder="senha atual">
    <input type="password" id="newpass" placeholder="nova senha">

    <button class="blue" onclick="changePass()">Alterar senha</button>
  </div>
</div>

<script>
const API = location.origin;
const token = localStorage.getItem("token");

function applyTheme(theme){
  const allowed = ["dark","light","lord","creeper"];
  const finalTheme = allowed.includes(theme) ? theme : "dark";
  document.documentElement.setAttribute("data-theme", finalTheme);
}

function loadSavedTheme(){
  const saved = localStorage.getItem("theme") || "dark";
  applyTheme(saved);
}

function show(id){
  document.querySelectorAll(".card").forEach(c => c.style.display = "none");
  document.getElementById(id).style.display = "block";
}

async function api(path, options = {}){
  options.headers = {
    Authorization: "Bearer " + token,
    ...(options.body instanceof FormData ? {} : { "Content-Type": "application/json" }),
    ...(options.headers || {})
  };

  const res = await fetch(API + path, options);
  return res.json();
}

async function loadStatus(){
  const data = await api("/api/status");
  document.getElementById("status").innerText = data.online ? "Online" : "Offline";
  document.getElementById("ip").innerText = data.minecraftHost + ":" + data.minecraftPort;
}

async function start(){
  await api("/api/start", { method:"POST" });
  loadStatus();
}

async function stop(){
  await api("/api/stop", { method:"POST" });
  loadStatus();
}

async function restart(){
  await api("/api/restart", { method:"POST" });
  loadStatus();
}

async function loadConsole(){
  const data = await api("/api/console");
  const box = document.getElementById("consoleBox");
  box.innerHTML = (data.lines || []).join("<br>");
  box.scrollTop = box.scrollHeight;
}

async function sendCommand(){
  const cmd = document.getElementById("command").value.trim();
  if (!cmd) return;

  await api("/api/command", {
    method:"POST",
    body: JSON.stringify({ command: cmd })
  });

  document.getElementById("command").value = "";
  loadConsole();
}

async function uploadPlugin(){
  const file = document.getElementById("pluginFile").files[0];
  if (!file) {
    alert("Selecione um plugin.");
    return;
  }

  const form = new FormData();
  form.append("plugin", file);

  const res = await fetch(API + "/api/upload-plugin", {
    method:"POST",
    headers:{ Authorization:"Bearer " + token },
    body: form
  });

  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }

  alert("Plugin enviado com sucesso.");
}

async function loadFiles(){
  const path = document.getElementById("path").value;
  const res = await api("/api/files?dir=" + encodeURIComponent(path));
  const list = document.getElementById("fileList");

  list.innerHTML = "";

  (res.items || []).forEach(i => {
    list.innerHTML += i.name + "<br>";
  });
}

async function loadConfig(){
  try{
    const data = await api("/api/server-config");
    const cfg = data.config || {};

    document.getElementById("cfg_motd").value = cfg["motd"] || "";
    document.getElementById("cfg_gamemode").value = cfg["gamemode"] || "survival";
    document.getElementById("cfg_difficulty").value = cfg["difficulty"] || "easy";
    document.getElementById("cfg_maxplayers").value = cfg["max-players"] || "20";
    document.getElementById("cfg_pvp").value = cfg["pvp"] || "true";
    document.getElementById("cfg_online_mode").value = cfg["online-mode"] || "true";
    document.getElementById("cfg_whitelist").value = cfg["white-list"] || "false";
    document.getElementById("cfg_commandblocks").value = cfg["enable-command-block"] || "false";
    document.getElementById("cfg_hardcore").value = cfg["hardcore"] || "false";
    document.getElementById("cfg_nether").value = cfg["allow-nether"] || "true";
    document.getElementById("cfg_viewdistance").value = cfg["view-distance"] || "10";
    document.getElementById("cfg_simdistance").value = cfg["simulation-distance"] || "10";
    document.getElementById("cfg_spawnprotection").value = cfg["spawn-protection"] || "16";
    document.getElementById("cfg_seed").value = cfg["level-seed"] || "";
    document.getElementById("cfg_levelname").value = cfg["level-name"] || "world";
    document.getElementById("cfg_serverport").value = cfg["server-port"] || "25565";
  }catch(err){
    alert("Erro ao carregar configurações.");
  }
}

async function saveConfig(){
  try{
    const config = {
      "motd": document.getElementById("cfg_motd").value.trim(),
      "gamemode": document.getElementById("cfg_gamemode").value,
      "difficulty": document.getElementById("cfg_difficulty").value,
      "max-players": document.getElementById("cfg_maxplayers").value,
      "pvp": document.getElementById("cfg_pvp").value,
      "online-mode": document.getElementById("cfg_online_mode").value,
      "white-list": document.getElementById("cfg_whitelist").value,
      "enable-command-block": document.getElementById("cfg_commandblocks").value,
      "hardcore": document.getElementById("cfg_hardcore").value,
      "allow-nether": document.getElementById("cfg_nether").value,
      "view-distance": document.getElementById("cfg_viewdistance").value,
      "simulation-distance": document.getElementById("cfg_simdistance").value,
      "spawn-protection": document.getElementById("cfg_spawnprotection").value,
      "level-seed": document.getElementById("cfg_seed").value.trim(),
      "level-name": document.getElementById("cfg_levelname").value.trim(),
      "server-port": document.getElementById("cfg_serverport").value
    };

    const data = await api("/api/server-config", {
      method:"POST",
      body: JSON.stringify({ config })
    });

    if (data.error){
      alert(data.error);
      return;
    }

    alert("Configuração salva com sucesso.");
  }catch(err){
    alert("Erro ao salvar configurações.");
  }
}

async function changePass(){
  const currentPassword = document.getElementById("oldpass").value.trim();
  const newPassword = document.getElementById("newpass").value.trim();

  if (!currentPassword || !newPassword){
    alert("Preencha a senha atual e a nova senha.");
    return;
  }

  const data = await api("/api/change-password", {
    method:"POST",
    body: JSON.stringify({
      currentPassword,
      newPassword
    })
  });

  if (data.error){
    alert(data.error);
    return;
  }

  alert(data.message || "Senha alterada com sucesso.");
  document.getElementById("oldpass").value = "";
  document.getElementById("newpass").value = "";
}

function logout(){
  localStorage.removeItem("token");
  location = "login.html";
}

async function loadMe(){
  const data = await api("/api/me");
  if (data.user && data.user.username){
    document.getElementById("username").innerText = data.user.username;
  }
}

loadSavedTheme();
loadStatus();
loadConfig();
loadMe();
setInterval(loadConsole, 2000);
</script>
</body>
</html>
