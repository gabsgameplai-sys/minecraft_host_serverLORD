<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel MyMineHost</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:18px 24px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:bold;
}

.top-links a{
color:white;
text-decoration:none;
margin-left:18px;
}

.layout{
display:grid;
grid-template-columns:260px 1fr;
min-height:calc(100vh - 63px);
}

.sidebar{
background:#111827;
border-right:1px solid #1e293b;
padding:20px;
}

.sidebar h3{
margin-top:0;
font-size:16px;
color:#93c5fd;
}

.menu-btn{
width:100%;
text-align:left;
background:#1e293b;
color:white;
border:none;
padding:12px 14px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.menu-btn:hover{
background:#334155;
}

.main{
padding:24px;
}

.card{
background:#1e293b;
border:1px solid #334155;
border-radius:14px;
padding:18px;
margin-bottom:20px;
}

.card h2{
margin-top:0;
}

.server-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:12px;
}

.btn{
background:#3b82f6;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#2563eb;
}

.btn.gray{
background:#475569;
}

.btn.gray:hover{
background:#64748b;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#14532d;
color:#bbf7d0;
font-size:14px;
margin-top:8px;
}

.console{
width:100%;
height:220px;
background:#020617;
color:#4ade80;
border:1px solid #334155;
border-radius:10px;
padding:12px;
font-family:Consolas, monospace;
resize:vertical;
}

.console-input-row{
display:flex;
gap:10px;
margin-top:10px;
}

.console-input{
flex:1;
background:#0f172a;
color:white;
border:1px solid #334155;
border-radius:10px;
padding:12px;
}

.files-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:14px;
}

.path-box{
background:#0f172a;
border:1px solid #334155;
padding:10px 12px;
border-radius:10px;
color:#cbd5e1;
width:100%;
max-width:520px;
}

.file-grid{
display:grid;
grid-template-columns:320px 1fr;
gap:18px;
}

.file-list{
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
padding:10px;
min-height:380px;
}

.file-item{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
background:#111827;
border:1px solid #1f2937;
}

.file-item:hover{
background:#1e293b;
}

.file-name{
display:flex;
align-items:center;
gap:8px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.tag{
font-size:12px;
padding:4px 8px;
border-radius:999px;
background:#1d4ed8;
color:white;
}

.editor-panel{
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
padding:12px;
min-height:380px;
display:flex;
flex-direction:column;
}

.editor-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.editor{
flex:1;
width:100%;
min-height:300px;
background:#020617;
color:#e2e8f0;
border:1px solid #334155;
border-radius:10px;
padding:12px;
font-family:Consolas, monospace;
}

.editor-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.small-note{
color:#94a3b8;
font-size:14px;
margin-top:8px;
}

@media (max-width:900px){
.layout{
grid-template-columns:1fr;
}

.file-grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<div class="logo">MyMineHost</div>
<div class="top-links">
<a href="index.html">Início</a>
<a href="panel.html">Painel</a>
</div>
</header>

<div class="layout">

<aside class="sidebar">
<h3>Menu do Painel</h3>

<button class="menu-btn" onclick="showSection('dashboard')">🏠 Dashboard</button>

<button class="menu-btn" onclick="showSection('consoleSection')">🖥 Console</button>

<button class="menu-btn" onclick="showSection('filesSection')">📁 Gerenciador de Arquivos</button>

</aside>


<main class="main">

<section id="dashboard" class="card">

<h2>Servidor Minecraft</h2>

<p>Nome: <strong>Meu Servidor</strong></p>

<p>Versão: <strong>Paper 1.21.1</strong></p>

<div class="status">● Online</div>

<div class="server-actions">

<button class="btn" onclick="addConsoleLine('Servidor iniciando...')">Iniciar</button>

<button class="btn gray" onclick="addConsoleLine('Servidor parando...')">Parar</button>

<button class="btn" onclick="addConsoleLine('Servidor reiniciando...')">Reiniciar</button>

</div>

</section>


<section id="consoleSection" class="card">

<h2>Console</h2>

<textarea id="consoleArea" class="console" readonly>[INFO] Painel iniciado...
[INFO] Servidor online.</textarea>

<div class="console-input-row">

<input id="consoleCommand" class="console-input" placeholder="Digite um comando">

<button class="btn" onclick="sendCommand()">Enviar</button>

</div>

</section>


<section id="filesSection" class="card">

<div class="files-header">

<h2>Gerenciador de Arquivos</h2>

<div class="path-box">/servers/meu-servidor/</div>

</div>

<div class="file-grid">

<div class="file-list">

<div class="file-item" onclick="openFile('server.properties',sampleFiles['server.properties'])">
<div class="file-name">📄 server.properties</div>
<span class="tag">txt</span>
</div>

<div class="file-item" onclick="openFile('eula.txt',sampleFiles['eula.txt'])">
<div class="file-name">📄 eula.txt</div>
<span class="tag">txt</span>
</div>

<div class="file-item" onclick="openFile('spigot.yml',sampleFiles['spigot.yml'])">
<div class="file-name">📄 spigot.yml</div>
<span class="tag">yml</span>
</div>

<div class="file-item" onclick="openFile('logs/latest.log',sampleFiles['logs/latest.log'])">
<div class="file-name">📄 logs/latest.log</div>
<span class="tag">log</span>
</div>

</div>

<div class="editor-panel">

<strong id="currentFileName">server.properties</strong>

<textarea id="fileEditor" class="editor">motd=Meu servidor</textarea>

<div class="editor-actions">

<button class="btn" onclick="fakeSave()">Salvar</button>

<button class="btn gray" onclick="fakeDelete()">Excluir</button>

</div>

</div>

</div>

</section>

</main>

</div>

<script>

const sampleFiles={
"server.properties":"motd=Meu servidor\nmax-players=20",
"eula.txt":"eula=true",
"spigot.yml":"settings:\n bungeecord: false",
"logs/latest.log":"[INFO] Server started"
};

function showSection(id){

const sections=["dashboard","consoleSection","filesSection"];

sections.forEach(sectionId=>{
document.getElementById(sectionId).style.display=
sectionId===id?"block":"none";
});

}

function openFile(name,content){

document.getElementById("currentFileName").innerText=name;

document.getElementById("fileEditor").value=content;

}

function addConsoleLine(text){

const area=document.getElementById("consoleArea");

area.value+="\n[INFO] "+text;

area.scrollTop=area.scrollHeight;

}

function sendCommand(){

const input=document.getElementById("consoleCommand");

const cmd=input.value.trim();

if(!cmd)return;

addConsoleLine("> "+cmd);

input.value="";

}

function fakeSave(){

alert("Salvar arquivo (backend necessário)");

}

function fakeDelete(){

alert("Excluir arquivo (backend necessário)");

}

showSection("dashboard");

</script>

</body>
</html>
