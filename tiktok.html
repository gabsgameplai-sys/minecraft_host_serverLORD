<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok LIVE - Host LORD</title>

<style>
:root{
  --bg:#0f172a;
  --bg-soft:#020617;
  --card:#020617;
  --text:#ffffff;
  --input:#020617;
  --border:#334155;
  --nav:#111827;
  --nav-hover:#2563eb;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --success:#22c55e;
  --danger:#dc2626;
  --console:#000000;
}

html[data-theme="light"]{
  --bg:#eef2ff;
  --bg-soft:#ffffff;
  --card:#ffffff;
  --text:#0f172a;
  --input:#ffffff;
  --border:#cbd5e1;
  --nav:#e2e8f0;
  --nav-hover:#2563eb;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --success:#22c55e;
  --danger:#dc2626;
  --console:#f8fafc;
}

html[data-theme="lord"]{
  --bg:#2b1d0e;
  --bg-soft:#3b2613;
  --card:#3a2612;
  --text:#f5e6c8;
  --input:#2a1b0c;
  --border:#8b5e2b;
  --nav:#4a3117;
  --nav-hover:#ffd54a;
  --primary:#ffd54a;
  --primary-hover:#f5c518;
  --success:#8bc34a;
  --danger:#c62828;
  --console:#1a1207;
}

html[data-theme="creeper"]{
  --bg:#0f1f0f;
  --bg-soft:#142814;
  --card:#1b331b;
  --text:#d8ffd8;
  --input:#102510;
  --border:#2e7d32;
  --nav:#244424;
  --nav-hover:#4caf50;
  --primary:#4caf50;
  --primary-hover:#43a047;
  --success:#00e676;
  --danger:#c62828;
  --console:#071307;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:230px;
  background:var(--bg-soft);
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.nav-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:var(--nav);
  border:none;
  color:var(--text);
  cursor:pointer;
  border-radius:6px;
  text-align:left;
}

.nav-btn:hover{
  background:var(--nav-hover);
  color:#fff;
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:14px;
  background:var(--input);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-right:10px;
  margin-top:6px;
  font-weight:bold;
}

.connect{
  background:var(--success);
  color:white;
}

.disconnect{
  background:var(--danger);
  color:white;
}

.secondary{
  background:var(--primary);
  color:white;
}

.console{
  background:var(--console);
  border:1px solid var(--border);
  padding:15px;
  border-radius:8px;
  height:350px;
  overflow:auto;
  font-family:monospace;
  font-size:13px;
  white-space:pre-wrap;
}

.rule{
  background:var(--input);
  border:1px solid var(--border);
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>👑 Host LORD</h2>

  <button class="nav-btn" onclick="window.location='panel.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location='panel.html'">🖥 Console</button>
  <button class="nav-btn" onclick="window.location='panel.html'">⚙️ Config</button>
  <button class="nav-btn" onclick="window.location='panel.html'">🧩 Plugins</button>
  <button class="nav-btn" onclick="window.location='panel.html'">📁 Arquivos</button>
  <button class="nav-btn" onclick="window.location='tiktok.html'">🎵 TikTok LIVE</button>
  <button class="nav-btn" onclick="window.location='temas.html'">🎨 Temas</button>
  <button class="nav-btn" onclick="window.location='panel.html'">👤 Conta</button>
  <button class="nav-btn" onclick="logout()">🚪 Sair</button>
</div>

<div class="main">
  <div class="card">
    <h1>🎵 TikTok LIVE</h1>

    <label>@ do TikTok</label>
    <input id="tiktokUser" placeholder="@usuario">

    <button class="connect" onclick="connect()">Conectar</button>
    <button class="disconnect" onclick="disconnect()">Desconectar</button>

    <p>Status: <span id="status">desconectado</span></p>
  </div>

  <div class="card">
    <h3>🎵 Eventos da LIVE</h3>
    <div id="events" class="console">Aguardando eventos...</div>
  </div>

  <div class="card">
    <h3>🎵 Automações TikTok → Minecraft</h3>

    <label>Evento</label>
    <select id="eventType">
      <option value="follow">Follow</option>
      <option value="gift">Gift</option>
      <option value="like">Like</option>
      <option value="share">Share</option>
      <option value="member">Member</option>
    </select>

    <label>A cada quantos</label>
    <input id="eventCount" type="number" value="1" min="1">

    <label>Comando Minecraft</label>
    <input id="mcCommand" placeholder="/summon zombie" value="/summon zombie">

    <button class="secondary" onclick="addRule()">Adicionar regra</button>
    <button class="secondary" onclick="loadRules()">Atualizar regras</button>

    <div id="rules"></div>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
const API = location.origin;
let eventSource = null;

function applyTheme(theme){
  const allowed = ["dark","light","lord","creeper"];
  const finalTheme = allowed.includes(theme) ? theme : "dark";
  document.documentElement.setAttribute("data-theme", finalTheme);
}

function loadSavedTheme(){
  const saved = localStorage.getItem("theme") || "dark";
  applyTheme(saved);
}

function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  location = "login.html";
}

function log(text){
  const box = document.getElementById("events");
  const current = box.innerHTML === "Aguardando eventos..." ? "" : box.innerHTML + "<br>";
  box.innerHTML = current + text;
  box.scrollTop = box.scrollHeight;
}

async function connect(){
  const user = document.getElementById("tiktokUser").value.trim();

  const res = await fetch(API + "/api/tiktoklive/connect", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({ uniqueId:user })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("status").innerText = "conectado";
  startStream();
}

async function disconnect(){
  await fetch(API + "/api/tiktoklive/disconnect", {
    method:"POST",
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  document.getElementById("status").innerText = "desconectado";

  if (eventSource) eventSource.close();
}

function startStream(){
  if (eventSource) eventSource.close();

  eventSource = new EventSource(API + "/api/tiktoklive/stream?token=" + encodeURIComponent(token));

  eventSource.onmessage = (msg) => {
    const event = JSON.parse(msg.data);

    if (event.type === "hello") return;
    if (event.type === "chat") log("💬 " + (event.data.nickname || "Usuário") + ": " + (event.data.comment || ""));
    if (event.type === "follow") log("➕ " + (event.data.nickname || "Usuário") + " seguiu");
    if (event.type === "gift") log("🎁 " + (event.data.nickname || "Usuário") + " enviou " + (event.data.giftName || "presente"));
    if (event.type === "like") log("❤️ " + (event.data.nickname || "Usuário") + " curtiu");
    if (event.type === "share") log("🔄 " + (event.data.nickname || "Usuário") + " compartilhou");
    if (event.type === "member") log("👋 " + (event.data.nickname || "Usuário") + " entrou");
    if (event.type === "error") log("❌ Erro: " + (event.data.message || "desconhecido"));
  };
}

async function addRule(){
  const eventType = document.getElementById("eventType").value;
  const everyCount = document.getElementById("eventCount").value;
  const command = document.getElementById("mcCommand").value.trim();

  const res = await fetch(API + "/api/tiktoklive/rules", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      eventType,
      everyCount,
      command
    })
  });

  const data = await res.json();
  alert(data.message || data.error || "Regra criada");
  loadRules();
}

async function deleteRule(id){
  const res = await fetch(API + "/api/tiktoklive/rules/" + encodeURIComponent(id), {
    method:"DELETE",
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  alert(data.message || data.error || "Regra removida");
  loadRules();
}

async function toggleRule(rule){
  const res = await fetch(API + "/api/tiktoklive/rules/" + encodeURIComponent(rule.id), {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      enabled: !rule.enabled
    })
  });

  const data = await res.json();
  alert(data.message || data.error || "Regra atualizada");
  loadRules();
}

async function editRule(rule){
  const newEventType = prompt("Evento (follow, like, gift, share, member):", rule.eventType);
  if (!newEventType) return;

  const newEveryCount = prompt("Executar a cada quantos eventos?", rule.everyCount);
  if (!newEveryCount) return;

  const newCommand = prompt("Comando do Minecraft:", rule.command);
  if (!newCommand) return;

  const res = await fetch(API + "/api/tiktoklive/rules/" + encodeURIComponent(rule.id), {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      eventType: newEventType.trim(),
      everyCount: Number(newEveryCount),
      command: newCommand.trim()
    })
  });

  const data = await res.json();
  alert(data.message || data.error || "Regra atualizada");
  loadRules();
}

async function loadRules(){
  const res = await fetch(API + "/api/tiktoklive/rules", {
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();

  const list = document.getElementById("rules");
  list.innerHTML = "";

  if (!data.rules || !data.rules.length){
    list.innerHTML = '<div class="rule">Nenhuma regra criada.</div>';
    return;
  }

  data.rules.forEach(rule => {
    const div = document.createElement("div");
    div.className = "rule";

    div.innerHTML = `
      <b>${rule.eventType}</b> — a cada ${rule.everyCount}<br>
      ${rule.command}<br><br>
    `;

    const editBtn = document.createElement("button");
    editBtn.className = "secondary";
    editBtn.textContent = "Editar";
    editBtn.onclick = () => editRule(rule);

    const toggleBtn = document.createElement("button");
    toggleBtn.className = "secondary";
    toggleBtn.textContent = rule.enabled ? "Desativar" : "Ativar";
    toggleBtn.onclick = () => toggleRule(rule);

    const delBtn = document.createElement("button");
    delBtn.className = "disconnect";
    delBtn.textContent = "Excluir";
    delBtn.onclick = () => deleteRule(rule.id);

    div.appendChild(editBtn);
    div.appendChild(toggleBtn);
    div.appendChild(delBtn);

    list.appendChild(div);
  });
}

window.addEventListener("load", () => {
  loadSavedTheme();
  loadRules();
});
</script>

</body>
</html>
